<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Youth Ministry Hub</title>
<style>
  :root{--bg:#0f172a;--panel:#1f2937;--panel2:#111827;--muted:#9ca3af;--line:#334155;--danger:#ef4444}
  *{box-sizing:border-box}
  body{font-family:system-ui,Arial;margin:0;background:var(--bg);color:#fff}
  header{background:var(--panel2);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
  #brand{font-weight:700;letter-spacing:.2px}
  nav{max-width:1000px;margin:auto;padding:10px 20px}
  nav a{color:#fff;text-decoration:none;font-size:14px;opacity:.9;padding:10px 12px;border-radius:10px;display:inline-block}
  nav a:hover{opacity:1;background:#0b1226}

  .container{max-width:1000px;margin:auto;padding:16px 20px}
  .card{background:var(--panel);padding:16px;border-radius:12px;margin-bottom:16px;border:1px solid rgba(51,65,85,.35)}
  h2{font-size:18px}
  h3{font-size:15px}
  button,input,select,textarea{padding:10px 10px;border-radius:10px;border:1px solid rgba(51,65,85,.5);background:#0b1226;color:#fff;margin:4px 0;outline:none}
  button{cursor:pointer;background:#111827}
  button:hover{filter:brightness(1.06)}
  input::placeholder,textarea::placeholder{color:#94a3b8}

  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .gallery .ph{background:var(--panel2);border:1px solid rgba(51,65,85,.35);border-radius:12px;overflow:hidden}
  .gallery img{width:100%;display:block;background:var(--panel2);aspect-ratio:1/1;object-fit:cover}
  .hidden{display:none}

  .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .day{background:var(--panel2);padding:8px;border-radius:10px;font-size:12px;min-height:70px;border:1px solid rgba(51,65,85,.35)}
  .day .small{margin-top:4px}

  .small{font-size:12px;color:var(--muted);line-height:1.35}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;background:var(--panel2);border:1px solid var(--line);padding:10px 12px;border-radius:12px;max-width:min(620px,calc(100% - 24px));display:none;z-index:30}
  .toast.err{border-color:var(--danger)}

  /* Mobile-first improvements */
  @media (max-width: 700px){
    nav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:rgba(17,24,39,.92);backdrop-filter:blur(10px);border-top:1px solid rgba(51,65,85,.5);padding:8px 10px;display:flex;justify-content:space-around;gap:6px;max-width:none}
    nav a{flex:1;text-align:center;padding:12px 8px;font-size:13px;border-radius:12px}
    .container{padding:14px 14px 80px}
    header{padding:10px 12px}
    #brand{font-size:14px}
    button,input,select,textarea{width:100%}
    .row > *{flex:1}
    .gallery{grid-template-columns:repeat(2,1fr)}
    .calendar{gap:5px}
    .day{min-height:64px;padding:7px}
  }
</style>
</head>
<body>
<header>
  <div id="brand">Youth Ministry Hub</div>
  <div class="row">
    <select id="lang" aria-label="Language">
      <option value="en">EN</option>
      <option value="es">ES</option>
    </select>
    <button id="loginBtn">Login</button>
    <button id="logoutBtn" class="hidden">Logout</button>
  </div>
</header>

<nav class="container" aria-label="Primary">
  <a id="navHome" href="#home">Home</a>
  <a id="navCalendar" href="#calendar">Calendar</a>
  <a id="navGallery" href="#gallery">Gallery</a>
  <a id="navLessons" href="#lessons">Lessons</a>
</nav>

<div class="container">
  <section id="home" class="view">
    <div class="card">
      <h2 id="verseTitle">Daily Bible Verse</h2>
      <p id="verse" class="small"></p>
      <p id="reflection" class="small"></p>
      <div class="row">
        <button id="verseRefreshBtn">Refresh</button>
        <span id="verseStamp" class="small"></span>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <h2 id="upcomingTitle" style="margin:0">Upcoming Events</h2>
        <button id="reloadEventsBtn" class="small">Reload</button>
      </div>
      <div id="nextEvents"></div>
    </div>

    <div id="adminPanel" class="card hidden">
      <h2 id="adminTitle">Admin Panel</h2>
      <div class="small" id="adminNote"></div>

      <h3 id="admAddEvent">Add Event</h3>
      <input id="adminEventStart" type="datetime-local" />
      <input id="adminEventTitle" placeholder="Event title" />
      <textarea id="adminEventDetails" placeholder="Details (optional)"></textarea>
      <button id="addEventBtn">Add Event</button>

      <h3 id="admAddLesson" style="margin-top:12px">Add Lesson</h3>
      <input id="adminLessonTitle" placeholder="Lesson title" />
      <input id="adminLessonDate" type="date" />
      <textarea id="adminLessonText" placeholder="Lesson text"></textarea>
      <button id="addLessonBtn">Add Lesson</button>
    </div>
  </section>

  <section id="calendar" class="view hidden">
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <h2 id="calTitle" style="margin:0">Events Calendar</h2>
        <button id="reloadCalendarBtn" class="small">Reload</button>
      </div>
      <div id="calendarGrid" class="calendar"></div>
      <div class="small" id="calHint" style="margin-top:10px"></div>
    </div>
  </section>

  <section id="gallery" class="view hidden">
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <h2 id="galTitle" style="margin:0">Gallery</h2>
        <button id="reloadGalleryBtn" class="small">Reload</button>
      </div>
      <div id="galleryGrid" class="gallery"></div>
      <div class="small" id="galHint" style="margin-top:10px"></div>
    </div>
  </section>

  <section id="lessons" class="view hidden">
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <h2 id="lesTitle" style="margin:0">Sunday Lessons</h2>
        <button id="reloadLessonsBtn" class="small">Reload</button>
      </div>
      <input id="lessonSearch" placeholder="Search lessons" />
      <div id="lessonList"></div>
    </div>
  </section>
</div>

<!-- LOGIN MODAL -->
<div id="authModal" class="hidden" style="position:fixed;inset:0;background:#0008;display:flex;align-items:center;justify-content:center;z-index:50">
  <div style="background:#1f2937;padding:20px;border-radius:12px;width:320px;border:1px solid rgba(51,65,85,.5)">
    <h3 id="authTitle" style="margin:0 0 10px">Account</h3>
    <label class="small" id="emailLabel" for="email">Email</label>
    <input id="email" placeholder="Email" autocomplete="email" />
    <label class="small" id="passLabel" for="password">Password</label>
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
    <div class="row" style="margin-top:10px">
      <button id="doLoginBtn">Login</button>
      <button id="doSignupBtn">Sign Up</button>
      <button id="closeAuthBtn">Close</button>
    </div>
    <button id="forgotBtn" style="margin-top:8px">Forgot password?</button>
    <div class="small" id="authNote" style="margin-top:10px"></div>
  </div>
</div>

<!-- ADMIN PASSCODE MODAL (2nd step) -->
<div id="adminModal" class="hidden" style="position:fixed;inset:0;background:#0008;display:flex;align-items:center;justify-content:center;z-index:60">
  <div style="background:#1f2937;padding:20px;border-radius:12px;width:320px;border:1px solid rgba(51,65,85,.5)">
    <h3 id="admVerifyTitle" style="margin:0 0 10px">Admin Verification</h3>
    <div class="small" id="admVerifyTip" style="margin-bottom:8px"></div>
    <label class="small" id="admCodeLabel" for="adminCode">Admin passcode</label>
    <input id="adminCode" inputmode="numeric" placeholder="4-10 digits" />
    <div class="row" style="margin-top:10px">
      <button id="verifyAdminBtn">Verify</button>
      <button id="cancelAdminBtn">Cancel</button>
    </div>
    <div class="small" id="admVerifyNote" style="margin-top:10px"></div>
  </div>
</div>

<!-- EVENT MODAL -->
<div id="eventModal" class="hidden" style="position:fixed;inset:0;background:#0009;display:flex;align-items:center;justify-content:center;z-index:40;padding:16px">
  <div class="card" style="max-width:460px;width:100%">
    <h3 id="evtTitle" style="margin-top:0"></h3>
    <div class="small" id="evtTime"></div>
    <div class="small" id="evtDetails" style="margin-top:8px"></div>
    <div class="row" style="margin-top:12px">
      <button id="evtToggleReminderBtn">Remind me</button>
      <button id="evtCloseBtn">Close</button>
    </div>
    <div class="small" id="evtNote" style="margin-top:8px"></div>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
// Put your Apps Script Web App URL here (must end with /exec)
const API = "https://script.google.com/macros/s/AKfycbz_hrJeCfaXNjfcC2EtCrJcIULWiI2v56RlQWKMwsBlUxHw_bEVnnRlmY3dYdfFR9NWQw/exec";

let user = null;
let cacheEvents = [], cacheGallery = [], cacheLessons = [];
let myReminderSet = new Set();
let currentEvent = null;

const dict = {
  en: {
    brand:"Youth Ministry Hub",
    navHome:"Home", navCalendar:"Calendar", navGallery:"Gallery", navLessons:"Lessons",
    verseTitle:"Daily Bible Verse", refresh:"Refresh", updated:"Updated:",
    upcomingTitle:"Upcoming Events",
    calTitle:"Events Calendar", calHint:"Tap an event title to see details.",
    galTitle:"Gallery", galHint:"Tap a photo to view it larger.",
    lesTitle:"Sunday Lessons", reload:"Reload", searchLessons:"Search lessons",
    authTitle:"Account", email:"Email", password:"Password", login:"Login", signup:"Sign Up", close:"Close", logout:"Logout",
    forgot:"Forgot password?", recoverySent:"If that email exists, a recovery email was sent.",
    accountCreated:"Account created", badLogin:"Incorrect email or password",
    netErr:"Network error. Make sure API is the Apps Script Web App /exec URL.",
    emptyEvents:"No events yet.", emptyGallery:"No photos yet.", emptyLessons:"No lessons yet.",
    adminTitle:"Admin Panel", adminNote:"Admins can add events + lessons.",
    admAddEvent:"Add Event", admAddLesson:"Add Lesson",
    admVerifyTitle:"Admin Verification",
    admVerifyTip:"Enter the admin passcode to unlock admin tools (4-10 digits).",
    admCodeLabel:"Admin passcode",
    verify:"Verify", cancel:"Cancel",
    admVerifyNote:"If your passcode in Sheets is blank, you won't be asked.",
    details:"Details (optional)",
    remind:"Remind me", removeRemind:"Remove notification",
    loginToRemind:"Login to use reminders.",
    remindOn:"You will get an email reminder at the event time.",
    remindOff:"You will not get a reminder for this event."
  },
  es: {
    brand:"Centro de Jóvenes",
    navHome:"Inicio", navCalendar:"Calendario", navGallery:"Galería", navLessons:"Lecciones",
    verseTitle:"Versículo del día", refresh:"Refrescar", updated:"Actualizado:",
    upcomingTitle:"Próximos eventos",
    calTitle:"Calendario de eventos", calHint:"Toca un evento para ver detalles.",
    galTitle:"Galería", galHint:"Toca una foto para verla grande.",
    lesTitle:"Lecciones (Domingo)", reload:"Recargar", searchLessons:"Buscar lecciones",
    authTitle:"Cuenta", email:"Email", password:"Contraseña", login:"Entrar", signup:"Crear", close:"Cerrar", logout:"Salir",
    forgot:"¿Olvidaste tu contraseña?", recoverySent:"Si ese email existe, se envió un correo de recuperación.",
    accountCreated:"Cuenta creada", badLogin:"Email o contraseña incorrectos",
    netErr:"Error de red. Asegúrate que API sea el Web App /exec de Apps Script.",
    emptyEvents:"Todavía no hay eventos.", emptyGallery:"Todavía no hay fotos.", emptyLessons:"Todavía no hay lecciones.",
    adminTitle:"Panel de Admin", adminNote:"Admins pueden agregar eventos y lecciones.",
    admAddEvent:"Agregar evento", admAddLesson:"Agregar lección",
    admVerifyTitle:"Verificación de Admin",
    admVerifyTip:"Escribe el passcode de admin (4-10 dígitos).",
    admCodeLabel:"Passcode de admin",
    verify:"Verificar", cancel:"Cancelar",
    admVerifyNote:"Si el passcode en Sheets está vacío, no se pide.",
    details:"Detalles (opcional)",
    remind:"Recordarme", removeRemind:"Quitar notificación",
    loginToRemind:"Inicia sesión para usar recordatorios.",
    remindOn:"Recibirás un correo a la hora del evento.",
    remindOff:"No recibirás recordatorio para este evento."
  }
};
function lang(){return localStorage.lang||"en"}
function t(k){return (dict[lang()]&&dict[lang()][k])||dict.en[k]||k}

function toast(msg, err=false){
  const el=document.getElementById("toast");
  el.classList.toggle("err",!!err);
  el.textContent=msg;
  el.style.display="block";
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>el.style.display="none",3200);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function applyLang(){
  document.documentElement.lang=lang();
  document.getElementById("brand").textContent=t("brand");
  document.getElementById("navHome").textContent=t("navHome");
  document.getElementById("navCalendar").textContent=t("navCalendar");
  document.getElementById("navGallery").textContent=t("navGallery");
  document.getElementById("navLessons").textContent=t("navLessons");

  document.getElementById("verseTitle").textContent=t("verseTitle");
  document.getElementById("verseRefreshBtn").textContent=t("refresh");
  document.getElementById("upcomingTitle").textContent=t("upcomingTitle");
  document.getElementById("calTitle").textContent=t("calTitle");
  document.getElementById("calHint").textContent=t("calHint");
  document.getElementById("galTitle").textContent=t("galTitle");
  document.getElementById("galHint").textContent=t("galHint");
  document.getElementById("lesTitle").textContent=t("lesTitle");

  document.getElementById("reloadEventsBtn").textContent=t("reload");
  document.getElementById("reloadCalendarBtn").textContent=t("reload");
  document.getElementById("reloadGalleryBtn").textContent=t("reload");
  document.getElementById("reloadLessonsBtn").textContent=t("reload");
  document.getElementById("lessonSearch").placeholder=t("searchLessons");

  document.getElementById("authTitle").textContent=t("authTitle");
  document.getElementById("emailLabel").textContent=t("email");
  document.getElementById("email").placeholder=t("email");
  document.getElementById("passLabel").textContent=t("password");
  document.getElementById("password").placeholder=t("password");
  document.getElementById("doLoginBtn").textContent=t("login");
  document.getElementById("doSignupBtn").textContent=t("signup");
  document.getElementById("closeAuthBtn").textContent=t("close");
  document.getElementById("loginBtn").textContent=t("login");
  document.getElementById("logoutBtn").textContent=t("logout");
  document.getElementById("forgotBtn").textContent=t("forgot");

  document.getElementById("adminTitle").textContent=t("adminTitle");
  document.getElementById("adminNote").textContent=t("adminNote");
  document.getElementById("admAddEvent").textContent=t("admAddEvent");
  document.getElementById("admAddLesson").textContent=t("admAddLesson");
  document.getElementById("adminEventTitle").placeholder=(lang()==="es")?"Título del evento":"Event title";
  document.getElementById("adminEventDetails").placeholder=t("details");

  document.getElementById("admVerifyTitle").textContent=t("admVerifyTitle");
  document.getElementById("admVerifyTip").textContent=t("admVerifyTip");
  document.getElementById("admCodeLabel").textContent=t("admCodeLabel");
  document.getElementById("verifyAdminBtn").textContent=t("verify");
  document.getElementById("cancelAdminBtn").textContent=t("cancel");
  document.getElementById("admVerifyNote").textContent=t("admVerifyNote");

  document.getElementById("evtToggleReminderBtn").textContent = myReminderSet.has(currentEvent?.id)?t("removeRemind"):t("remind");

  renderEvents(cacheEvents); renderGallery(cacheGallery); renderLessons(cacheLessons);
}

const langSel=document.getElementById("lang");
langSel.value=lang();
langSel.onchange=()=>{localStorage.lang=langSel.value;applyLang();};

function show(){
  document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden"));
  const id=location.hash.replace("#","")||"home";
  const el=document.getElementById(id);
  if(el) el.classList.remove("hidden");
}
window.addEventListener("hashchange",show);
show();

async function api(action,payload={}){
  const body=JSON.stringify({action,...payload});
  const r=await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body,mode:"cors",redirect:"follow",cache:"no-store"});
  return await r.json();
}

// DAILY VERSE
function todayKey(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
async function loadVerse(force=false){
  const key="verse:"+todayKey();
  if(!force && localStorage.getItem(key)){renderVerse(JSON.parse(localStorage.getItem(key)));return;}
  try{
    const r=await fetch("https://beta.ourmanna.com/api/v1/get/?format=json",{cache:"no-store"});
    const j=await r.json();
    const v={text:j.verse.details.text,ref:j.verse.details.reference,ts:new Date().toISOString()};
    localStorage.setItem(key,JSON.stringify(v));
    renderVerse(v);
  }catch{document.getElementById("verse").innerText=(lang()==="es")?"Error al cargar el versículo":"Error loading verse";}
}
function generateReflection(){
  return (lang()==="es")
    ? "Reflexión: Piensa en cómo este versículo se aplica a tu vida diaria y cómo puedes vivirlo hoy."
    : "Reflection: Think about how this verse applies to your daily life and how you can live it out today.";
}
function renderVerse(v){
  document.getElementById("verse").innerText=v.text+" — "+v.ref;
  document.getElementById("reflection").innerText=generateReflection();
  document.getElementById("verseStamp").innerText=t("updated")+" "+new Date(v.ts).toLocaleString();
}

document.getElementById("verseRefreshBtn").onclick=()=>loadVerse(true);

// AUTH
const authModal=document.getElementById("authModal");
const adminModal=document.getElementById("adminModal");
const eventModal=document.getElementById("eventModal");

document.getElementById("loginBtn").onclick=()=>authModal.classList.remove("hidden");
document.getElementById("closeAuthBtn").onclick=()=>authModal.classList.add("hidden");
document.getElementById("forgotBtn").onclick=requestRecovery;

document.getElementById("logoutBtn").onclick=()=>{
  user=null; myReminderSet=new Set();
  localStorage.removeItem("user");
  updateAuth();
};

function persistUser(){ localStorage.user=JSON.stringify(user); }

function updateAuth(){
  const logged=!!user;
  document.getElementById("loginBtn").classList.toggle("hidden",logged);
  document.getElementById("logoutBtn").classList.toggle("hidden",!logged);
  updateAdminUI();
}

function isAdminUnlocked(){
  return user && user.role==="admin" && user.adminVerified===true && user.adminToken;
}

function updateAdminUI(){
  document.getElementById("adminPanel").classList.toggle("hidden", !isAdminUnlocked());
}

document.getElementById("doLoginBtn").onclick=login;
document.getElementById("doSignupBtn").onclick=signup;

document.getElementById("verifyAdminBtn").onclick=verifyAdmin;
document.getElementById("cancelAdminBtn").onclick=()=>{
  adminModal.classList.add("hidden");
  if(user){ user.adminVerified=false; user.adminToken=null; persistUser(); updateAdminUI(); }
};

document.getElementById("evtCloseBtn").onclick=()=>eventModal.classList.add("hidden");
document.getElementById("evtToggleReminderBtn").onclick=toggleReminder;

async function login(){
  const email=document.getElementById("email").value;
  const pass=document.getElementById("password").value;
  try{
    const j=await api("login",{email,pass});
    if(!j.ok) return toast(t("badLogin"),true);

    user=j.user;
    // token may be included if admin passcode is blank
    if(user.role==="admin"){
      user.adminVerified = !j.needsPasscode;
      user.adminToken = j.adminToken || null;
      persistUser();
      updateAuth();
      authModal.classList.add("hidden");
      if(j.needsPasscode) adminModal.classList.remove("hidden");
      if(!j.needsPasscode) { await loadMyReminders(); toast("OK"); }
      return;
    }

    persistUser();
    updateAuth();
    authModal.classList.add("hidden");
    await loadMyReminders();
    toast("OK");
  }catch{ toast(t("netErr"),true); }
}

async function verifyAdmin(){
  if(!user || user.role!=="admin") return;
  const code=String(document.getElementById("adminCode").value||"").trim();
  try{
    const j=await api("verifyAdmin",{email:user.email,code});
    if(j.ok){
      user.adminVerified=true;
      user.adminToken=j.adminToken;
      persistUser();
      adminModal.classList.add("hidden");
      updateAdminUI();
      await loadMyReminders();
      toast("OK");
    }else toast(String(j.error||"error"),true);
  }catch{ toast(t("netErr"),true); }
}

async function signup(){
  const email=document.getElementById("email").value;
  const pass=document.getElementById("password").value;
  try{
    const j=await api("signup",{email,pass});
    if(j.ok) toast(t("accountCreated"));
    else toast(String(j.error||"error"),true);
  }catch{ toast(t("netErr"),true); }
}

async function requestRecovery(){
  const email=document.getElementById("email").value;
  if(!email) return toast("Email", true);
  try{
    const j=await api("requestRecovery",{email});
    if(j.ok) toast(t("recoverySent"));
    else toast(t("recoverySent"));
  }catch{ toast(t("recoverySent")); }
}

if(localStorage.user){ try{ user=JSON.parse(localStorage.user); }catch{} }
updateAuth();

// EVENTS
async function loadEvents(){
  try{ const j=await api("events"); cacheEvents=j.events||[]; renderEvents(cacheEvents); renderCalendar(cacheEvents); }
  catch{ toast(t("netErr"),true); }
}
function fmtWhen(iso){
  const d=new Date(iso);
  if(isNaN(d)) return iso||"";
  return d.toLocaleString();
}
function renderEvents(events){
  const next=document.getElementById("nextEvents");
  next.innerHTML="";
  if(!events.length){ next.innerHTML=`<div class="small">${t("emptyEvents")}</div>`; return; }
  events.slice(0,5).forEach(e=>{
    const div=document.createElement("div");
    div.className="small";
    div.style.cursor="pointer";
    div.textContent=fmtWhen(e.start)+" - "+e.title;
    div.onclick=()=>openEvent(e);
    next.appendChild(div);
  });
}

function openEvent(e){
  currentEvent = e;
  document.getElementById("evtTitle").textContent = e.title||"";
  document.getElementById("evtTime").textContent = fmtWhen(e.start);
  document.getElementById("evtDetails").textContent = e.details||"";
  document.getElementById("evtToggleReminderBtn").textContent = myReminderSet.has(e.id)?t("removeRemind"):t("remind");
  document.getElementById("evtNote").textContent = user ? (myReminderSet.has(e.id)?t("remindOn"):t("remindOff")) : t("loginToRemind");
  eventModal.classList.remove("hidden");
}

async function toggleReminder(){
  if(!currentEvent) return;
  if(!user) return toast(t("loginToRemind"), true);
  const on = !myReminderSet.has(currentEvent.id);
  try{
    const j=await api("setReminder",{email:user.email,eventId:currentEvent.id,enabled:on});
    if(j.ok){
      if(on) myReminderSet.add(currentEvent.id); else myReminderSet.delete(currentEvent.id);
      openEvent(currentEvent);
      toast("OK");
    }else toast(String(j.error||"error"), true);
  }catch{ toast(t("netErr"),true); }
}

async function loadMyReminders(){
  if(!user) return;
  try{
    const j=await api("myReminders",{email:user.email});
    myReminderSet = new Set((j.eventIds||[]).map(String));
  }catch{ myReminderSet = new Set(); }
}

function renderCalendar(events){
  const cal=document.getElementById("calendarGrid");
  cal.innerHTML="";
  // simple month view placeholder: show 31 boxes with events by day-of-month
  for(let i=1;i<=31;i++){
    const d=document.createElement("div");
    d.className="day";
    d.textContent=i;
    (events||[]).filter(ev=>{ const dt=new Date(ev.start); return !isNaN(dt)&&dt.getDate()===i; }).forEach(ev=>{
      const s=document.createElement("div");
      s.className="small";
      s.textContent=ev.title;
      s.style.cursor="pointer";
      s.onclick=()=>openEvent(ev);
      d.appendChild(s);
    });
    cal.appendChild(d);
  }
}

document.getElementById("reloadEventsBtn").onclick=loadEvents;
document.getElementById("reloadCalendarBtn").onclick=loadEvents;

// GALLERY
async function loadGallery(){
  try{ const j=await api("gallery"); cacheGallery=j.photos||[]; renderGallery(cacheGallery); }
  catch{ toast(t("netErr"),true); }
}
function renderGallery(photos){
  const g=document.getElementById("galleryGrid");
  g.innerHTML="";
  if(!photos.length){ g.innerHTML=`<div class="small">${t("emptyGallery")}</div>`; return; }
  photos.forEach(p=>{
    const wrap=document.createElement("div"); wrap.className="ph"; wrap.style.cursor="pointer";
    const img=document.createElement("img"); img.loading="lazy"; img.referrerPolicy="no-referrer"; img.src=p.url; img.alt="photo";
    wrap.appendChild(img); g.appendChild(wrap);
    wrap.onclick=()=>openPhotoModal(p.url);
  });
}
function openPhotoModal(url){
  const m=document.createElement("div");
  m.style.cssText="position:fixed;inset:0;background:#000c;display:flex;align-items:center;justify-content:center;z-index:45;padding:16px";
  const box=document.createElement("div");
  box.className="card"; box.style.maxWidth="760px"; box.style.width="100%";
  box.innerHTML=`<img src="${escapeHtml(url)}" alt="photo" style="width:100%;border-radius:10px;max-height:70vh;object-fit:contain;background:#0b1226"/>
                 <button id="closePhoto" style="margin-top:10px">${t("close")}</button>`;
  m.appendChild(box); document.body.appendChild(m);
  box.querySelector("#closePhoto").onclick=()=>m.remove();
  m.onclick=(ev)=>{ if(ev.target===m) m.remove(); };
}

document.getElementById("reloadGalleryBtn").onclick=loadGallery;

// LESSONS
async function loadLessons(){
  try{ const j=await api("lessons"); cacheLessons=j.lessons||[]; renderLessons(cacheLessons); }
  catch{ toast(t("netErr"),true); }
}
function renderLessons(list){
  const box=document.getElementById("lessonList");
  const q=(document.getElementById("lessonSearch").value||"").toLowerCase();
  box.innerHTML="";
  if(!list.length){ box.innerHTML=`<div class="small">${t("emptyLessons")}</div>`; return; }
  list.filter(l=>String(l.title||"").toLowerCase().includes(q)||String(l.text||"").toLowerCase().includes(q)||String(l.date||"").toLowerCase().includes(q))
      .forEach(l=>{
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`<b>${escapeHtml(l.title||"")}</b><div class='small'>${escapeHtml(l.date||"")}</div><p>${escapeHtml(l.text||"")}</p>`;
        box.appendChild(div);
      });
}

document.getElementById("lessonSearch").oninput=()=>renderLessons(cacheLessons);
document.getElementById("reloadLessonsBtn").onclick=loadLessons;

// ADMIN actions (require adminToken)
document.getElementById("addEventBtn").onclick=addEvent;
document.getElementById("addLessonBtn").onclick=addLesson;

async function addEvent(){
  if(!isAdminUnlocked()) return toast(t("admVerifyTip"), true);
  const start=document.getElementById("adminEventStart").value;
  const title=document.getElementById("adminEventTitle").value;
  const details=document.getElementById("adminEventDetails").value;
  try{
    const j=await api("addEvent",{start,title,details,adminEmail:user.email,adminToken:user.adminToken});
    if(j.ok){ document.getElementById("adminEventTitle").value=""; document.getElementById("adminEventDetails").value=""; loadEvents(); toast("OK"); }
    else toast(String(j.error||"error"),true);
  }catch{ toast(t("netErr"),true); }
}

async function addLesson(){
  if(!isAdminUnlocked()) return toast(t("admVerifyTip"), true);
  const title=document.getElementById("adminLessonTitle").value;
  const date=document.getElementById("adminLessonDate").value;
  const text=document.getElementById("adminLessonText").value;
  try{
    const j=await api("addLesson",{title,date,text,adminEmail:user.email,adminToken:user.adminToken});
    if(j.ok){ document.getElementById("adminLessonTitle").value=""; document.getElementById("adminLessonText").value=""; loadLessons(); toast("OK"); }
    else toast(String(j.error||"error"),true);
  }catch{ toast(t("netErr"),true); }
}

// Init
applyLang();
loadVerse(false);
loadEvents();
loadGallery();
loadLessons();
if(user) loadMyReminders();
</script>
</body>
